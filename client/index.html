<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pioneer Portal V3 - Virtual Classroom</title>
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            /* Warna background gelap elegan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
            outline: none;
        }

        /* Overlay Login */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .login-card {
            background: #2d2d2d;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
        }

        h1 {
            color: #00d2ff;
            margin-bottom: 0.5rem;
        }

        p {
            color: #ccc;
            margin-bottom: 2rem;
        }

        #login-btn {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        #login-btn:hover {
            background-color: #357ae8;
            transform: scale(1.05);
        }

        /* Status Audio */
        #audio-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
        }

        /* Container untuk joystick */
        .joystick-container {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            pointer-events: none;
            /* Supaya nggak nge-blok klik di area lain */
            z-index: 10;
        }

        /* Bulatan Joystick */
        .joystick {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: auto;
            /* Aktifkan sentuhan khusus di sini */
            border: 2px solid rgba(255, 255, 255, 0.4);
            touch-action: none;
        }
    </style>
</head>

<body>

    <div id="ui-overlay">
        <div class="login-card">
            <h1>PIONEER PORTAL V3</h1>
            <p>Selamat datang di Kelas Virtual Masa Depan</p>
            <button id="login-btn">Masuk dengan Google</button>
            <button id="logout-btn"
                style="display: none; position: absolute; top: 20px; right: 20px; z-index: 20; background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                Keluar Kelas
            </button>
        </div>
    </div>
    <div id="capacity-indicator" style="
    position: absolute; 
    top: 20px; 
    right: 20px; 
    background: rgba(0,0,0,0.6); 
    color: #00ff00; 
    padding: 10px 15px; 
    border-radius: 8px; 
    font-family: 'Courier New', monospace;
    border: 1px solid #00ff00;
    pointer-events: none;
    z-index: 100;
">
        Kapasitas: <span id="current-cap">0</span>/<span id="max-cap">10</span>
    </div>
    <canvas id="renderCanvas"></canvas>
    <div class="joystick-container" id="mobile-controls" style="display: none;">
        <div id="leftJoystick" class="joystick"></div>

        <div id="rightJoystick" class="joystick"></div>
    </div>

    <div id="audio-status">Status: Menunggu Interaksi...</div>

    <script type="module" src="/src/main.ts"></script>

</body>

</html>
